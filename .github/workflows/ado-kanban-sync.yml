# Azure DevOps Kanban Sync
#
# Updates ADO work item state based on PR lifecycle events.
#
# Branch convention: feature/123-description (123 = work item ID)
# State machine: opened/reopened → Doing | merged → Done | closed unmerged → To Do
#
# State names below match the ADO Basic process template.
# Agile template equivalents: Doing→Active, Done→Closed, To Do→New
#
# Soft-fail policy: this workflow never fails the run. Problems
# (no ticket in branch name, bad credentials, ADO errors) surface
# as ::warning:: annotations instead, so PRs unrelated to a ticket
# don't generate failure noise.
#
# Config — Repo Settings → Secrets and variables → Actions:
#   Variables: ADO_ORG_URL, ADO_PROJECT
#   Secrets:   ADO_PAT (Work Items: Read & Write scope)

name: Sync PR status to Azure DevOps Kanban board

on:
  pull_request:
    types:
      - opened
      - closed
      - reopened
      - converted_to_draft
      - ready_for_review

jobs:
  sync-ado:
    name: Move ticket based on PR activity
    runs-on: ubuntu-latest

    steps:
      - name: Read work item ID from branch name
        id: extract_id
        run: |
          BRANCH="${{ github.head_ref }}"
          WORK_ITEM_ID=$(echo "$BRANCH" | grep -oE '[0-9]+' | head -n1)

          if [ -z "$WORK_ITEM_ID" ]; then
            echo "::warning::No ADO work item ID found in branch name '$BRANCH' — skipping Kanban sync for this PR."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found ADO work item ID: $WORK_ITEM_ID"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "work_item_id=$WORK_ITEM_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Choose the ADO state to move the ticket to
        id: determine_state
        if: steps.extract_id.outputs.found == 'true'
        run: |
          EVENT="${{ github.event.action }}"
          MERGED="${{ github.event.pull_request.merged }}"

          if [ "$EVENT" = "closed" ] && [ "$MERGED" = "true" ]; then
            TARGET_STATE="Done"
          elif [ "$EVENT" = "closed" ] && [ "$MERGED" = "false" ]; then
            TARGET_STATE="To Do"
          else
            TARGET_STATE="Doing"
          fi

          echo "PR event '$EVENT' (merged=$MERGED) → targeting ADO state: $TARGET_STATE"
          echo "target_state=$TARGET_STATE" >> "$GITHUB_OUTPUT"

      - name: Confirm the ADO ticket exists before changing it
        id: verify_item
        if: steps.extract_id.outputs.found == 'true'
        env:
          ADO_ORG_URL: ${{ vars.ADO_ORG_URL }}
          ADO_PROJECT: ${{ vars.ADO_PROJECT }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          WORK_ITEM_ID: ${{ steps.extract_id.outputs.work_item_id }}
        run: |
          # PAT used as Basic auth password with an empty username
          AUTH=$(printf ":%s" "$ADO_PAT" | base64 -w0)
          ITEM_URL="${ADO_ORG_URL}/${ADO_PROJECT}/_apis/wit/workitems/${WORK_ITEM_ID}?api-version=7.1"

          # Body to a temp file, status captured separately —
          # avoids fragile parsing of a combined write-out string
          BODY_FILE=$(mktemp)
          HTTP_STATUS=$(curl --silent --output "$BODY_FILE" --write-out "%{http_code}" \
            --request GET \
            --url "$ITEM_URL" \
            --header "Authorization: Basic ${AUTH}" \
            --header "Accept: application/json")
          CURL_EXIT=$?
          HTTP_BODY=$(cat "$BODY_FILE" 2>/dev/null || echo "")
          rm -f "$BODY_FILE"

          if [ $CURL_EXIT -ne 0 ]; then
            echo "::warning::curl failed (exit $CURL_EXIT) while contacting ADO. Check network/URL config. Skipping sync for work item $WORK_ITEM_ID."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$HTTP_STATUS" = "401" ]; then
            echo "::warning::ADO returned 401 Unauthorized for work item $WORK_ITEM_ID. Check that ADO_PAT is valid and has Work Items (Read & Write) scope. Skipping sync."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$HTTP_STATUS" = "404" ]; then
            echo "::warning::Work item $WORK_ITEM_ID not found in project '${ADO_PROJECT}'. Check the ID in the branch name. Skipping sync."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::ADO API returned unexpected HTTP $HTTP_STATUS for work item $WORK_ITEM_ID. Response: $HTTP_BODY. Skipping sync."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ITEM_TITLE=$(echo "$HTTP_BODY" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data.get('fields', {}).get('System.Title', '(unknown)'))
          ")

          echo "Confirmed work item: [$WORK_ITEM_ID] $ITEM_TITLE"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "item_title=$ITEM_TITLE" >> "$GITHUB_OUTPUT"

      - name: Move the ADO ticket to its new state
        id: update_state
        if: steps.extract_id.outputs.found == 'true' && steps.verify_item.outputs.found == 'true'
        env:
          ADO_ORG_URL: ${{ vars.ADO_ORG_URL }}
          ADO_PROJECT: ${{ vars.ADO_PROJECT }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          WORK_ITEM_ID: ${{ steps.extract_id.outputs.work_item_id }}
          TARGET_STATE: ${{ steps.determine_state.outputs.target_state }}
        run: |
          AUTH=$(printf ":%s" "$ADO_PAT" | base64 -w0)
          PATCH_URL="${ADO_ORG_URL}/${ADO_PROJECT}/_apis/wit/workitems/${WORK_ITEM_ID}?api-version=7.1"

          # JSON Patch (RFC 6902) — ADO sets state directly by name, no transition ID
          PATCH_BODY=$(python3 -c "
          import json
          patch = [{'op': 'replace', 'path': '/fields/System.State', 'value': '${TARGET_STATE}'}]
          print(json.dumps(patch))
          ")

          echo "Patching work item $WORK_ITEM_ID → state: $TARGET_STATE"

          BODY_FILE=$(mktemp)
          HTTP_STATUS=$(curl --silent --output "$BODY_FILE" --write-out "%{http_code}" \
            --request PATCH \
            --url "$PATCH_URL" \
            --header "Authorization: Basic ${AUTH}" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json-patch+json" \
            --data "$PATCH_BODY")
          CURL_EXIT=$?
          HTTP_BODY=$(cat "$BODY_FILE" 2>/dev/null || echo "")
          rm -f "$BODY_FILE"

          if [ $CURL_EXIT -ne 0 ]; then
            echo "::warning::curl failed (exit $CURL_EXIT) while patching work item $WORK_ITEM_ID."
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$HTTP_STATUS" = "400" ]; then
            echo "::warning::ADO rejected the state transition (HTTP 400) for work item $WORK_ITEM_ID."
            echo "::warning::The state '$TARGET_STATE' may not be valid for this work item type or process template."
            echo "::warning::If your team uses the Agile process, update state names: Doing→Active, Done→Closed, To Do→New."
            echo "::warning::Response: $HTTP_BODY"
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::ADO PATCH returned unexpected HTTP $HTTP_STATUS for work item $WORK_ITEM_ID. Response: $HTTP_BODY"
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "✓ Work item $WORK_ITEM_ID successfully transitioned to '$TARGET_STATE'."
          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Leave a comment on the ticket linking back to the PR
        if: steps.update_state.outputs.success == 'true'
        env:
          ADO_ORG_URL: ${{ vars.ADO_ORG_URL }}
          ADO_PROJECT: ${{ vars.ADO_PROJECT }}
          ADO_PAT: ${{ secrets.ADO_PAT }}
          WORK_ITEM_ID: ${{ steps.extract_id.outputs.work_item_id }}
          TARGET_STATE: ${{ steps.determine_state.outputs.target_state }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_ACTION: ${{ github.event.action }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_ACTOR: ${{ github.actor }}
        run: |
          AUTH=$(printf ":%s" "$ADO_PAT" | base64 -w0)
          COMMENT_URL="${ADO_ORG_URL}/${ADO_PROJECT}/_apis/wit/workitems/${WORK_ITEM_ID}/comments?api-version=7.1-preview.3"

          if [ "$PR_ACTION" = "closed" ] && [ "$PR_MERGED" = "true" ]; then
            EVENT_DESC="merged"
          elif [ "$PR_ACTION" = "closed" ] && [ "$PR_MERGED" = "false" ]; then
            EVENT_DESC="closed without merging"
          else
            EVENT_DESC="$PR_ACTION"
          fi

          # ADO comments accept HTML
          COMMENT_BODY=$(python3 -c "
          import json
          html = (
              '<p>PR <strong>${EVENT_DESC}</strong> by ${PR_ACTOR}:</p>'
              '<p><a href=\"${PR_URL}\">${PR_TITLE}</a></p>'
              '<p>Work item state automatically updated to <strong>${TARGET_STATE}</strong> by CI/CD pipeline.</p>'
          )
          print(json.dumps({'text': html}))
          ")

          BODY_FILE=$(mktemp)
          HTTP_STATUS=$(curl --silent --output "$BODY_FILE" --write-out "%{http_code}" \
            --request POST \
            --url "$COMMENT_URL" \
            --header "Authorization: Basic ${AUTH}" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --data "$COMMENT_BODY")
          CURL_EXIT=$?
          HTTP_BODY=$(cat "$BODY_FILE" 2>/dev/null || echo "")
          rm -f "$BODY_FILE"

          if [ $CURL_EXIT -ne 0 ] || [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Failed to post comment to work item $WORK_ITEM_ID (HTTP $HTTP_STATUS). State transition already applied — non-fatal."
          else
            echo "✓ Comment posted to work item $WORK_ITEM_ID."
          fi
