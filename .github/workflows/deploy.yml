name: Deploy SpaceStation

on:
  push:
    branches:
      - main

jobs:
  deploy-manifest-logger:
    name: Deploy ManifestLogger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: SpaceStation-RG
          template: infra/main.bicep
          parameters: azureStorageConnection=${{ secrets.AZURE_STORAGE_CONNECTION }}

      - name: Build
        run: dotnet publish src/StationShipManifestLogger/StationShipManifestLogger/StationShipManifestLogger.csproj -c Release -o ./publish/manifest-logger

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ship-manifest-logger-api
          package: ./publish/manifest-logger

  deploy-station-ai:
    name: Deploy StationAI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: SpaceStation-RG
          template: infra/station-ai.bicep
          parameters: blobStorageConnection=${{ secrets.AZURE_STORAGE_CONNECTION }} googleApiKey=${{ secrets.GOOGLE_API_KEY }}

      - name: Build API
        run: dotnet publish src/StationAI/StationAI/StationAI.csproj -c Release -o ./publish/station-ai

      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: station-ai-api
          package: ./publish/station-ai

      - name: Build Functions
        run: dotnet publish src/StationAI/StationAI.Functions/StationAI.Functions.csproj -c Release -o ./publish/station-ai-functions

      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: station-ai-functions
          package: ./publish/station-ai-functions

  deploy-station-triage:
    name: Deploy StationTriage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: SpaceStation-RG
          template: infra/station-triage.bicep
          parameters: databaseUrl=${{ secrets.NEON_DATABASE_URL }} djangoSecretKey=${{ secrets.DJANGO_SECRET_KEY }} azureStorageConnection=${{ secrets.AZURE_STORAGE_CONNECTION }}

      - name: Create deployment package
        run: |
          cd src/StationTriage/station_triage
          zip -r $GITHUB_WORKSPACE/station-triage.zip . -x "venv/*" -x "*.pyc" -x "__pycache__/*" -x ".env" -x "db.sqlite3" -x "functions/*"

      - name: Deploy Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: station-triage-web
          package: station-triage.zip

      - name: Create functions storage container
        run: |
          az storage container create \
            --name app-package-station-triage-functions \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION }}"

      - name: Stage functions deployment package
        run: |
          mkdir -p staging/functions-deploy
          cp -r src/StationTriage/station_triage/triage staging/functions-deploy/
          cp -r src/StationTriage/station_triage/station_triage staging/functions-deploy/
          cp src/StationTriage/station_triage/functions/function_app.py staging/functions-deploy/
          cp src/StationTriage/station_triage/functions/host.json staging/functions-deploy/
          cp src/StationTriage/station_triage/functions/requirements.txt staging/functions-deploy/
          cd staging/functions-deploy
          zip -r $GITHUB_WORKSPACE/station-triage-functions.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: station-triage-functions
          package: station-triage-functions.zip
          remote-build: true