name: Deploy SpaceStation
on:
  push:
    branches:
      - main
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test StationShipManifestLogger
        run: dotnet test src/StationShipManifestLogger/StationShipManifestLogger.Tests/StationShipManifestLogger.Tests.csproj -c Release

      - name: Test StationAI
        run: dotnet test src/StationAI/StationAI.Tests/StationAI.Tests.csproj -c Release

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install StationTriage test dependencies
        working-directory: src/StationTriage/station_triage
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Test StationTriage
        working-directory: src/StationTriage/station_triage
        env:
          DATABASE_URL: sqlite:///test.db
          DJANGO_SECRET_KEY: ci-test-secret-key
          DEBUG: 'True'
        run: pytest

  deploy-manifest-logger:
    name: Deploy ManifestLogger
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Run Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: SpaceStation-RG
          template: infra/main.bicep
          parameters: azureStorageConnection=${{ secrets.AZURE_STORAGE_CONNECTION }}
      - name: Build
        run: dotnet publish src/StationShipManifestLogger/StationShipManifestLogger/StationShipManifestLogger.csproj -c Release -o ./publish/manifest-logger
      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ship-manifest-logger-api
          package: ./publish/manifest-logger

  deploy-station-ai:
    name: Deploy StationAI
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Run Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: SpaceStation-RG
          template: infra/station-ai.bicep
          parameters: blobStorageConnection=${{ secrets.AZURE_STORAGE_CONNECTION }} googleApiKey=${{ secrets.GOOGLE_API_KEY }}
      - name: Build API
        run: dotnet publish src/StationAI/StationAI/StationAI.csproj -c Release -o ./publish/station-ai
      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: station-ai-api
          package: ./publish/station-ai
      - name: Build Functions
        run: dotnet publish src/StationAI/StationAI.Functions/StationAI.Functions.csproj -c Release -o ./publish/station-ai-functions
      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: station-ai-functions
          package: ./publish/station-ai-functions

  deploy-station-triage:
    name: Deploy StationTriage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Run Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: SpaceStation-RG
          template: infra/station-triage.bicep
          parameters: databaseUrl=${{ secrets.NEON_DATABASE_URL }} djangoSecretKey=${{ secrets.DJANGO_SECRET_KEY }} azureStorageConnection=${{ secrets.AZURE_STORAGE_CONNECTION }}
      - name: Create deployment package
        run: |
          cd src/StationTriage/station_triage
          zip -r $GITHUB_WORKSPACE/station-triage.zip . -x "venv/*" -x "*.pyc" -x "__pycache__/*" -x ".env" -x "db.sqlite3" -x "functions/*"
      - name: Deploy Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: station-triage-web
          package: station-triage.zip
      - name: Create functions storage container
        run: |
          az storage container create \
            --name app-package-station-triage-functions \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION }}"
      - name: Create functions deployment package
        run: |
          cd src/StationTriage/station_triage/functions
          zip -r $GITHUB_WORKSPACE/station-triage-functions.zip . -x "*.pyc" -x "__pycache__/*" -x "local.settings.json"
      - name: Deploy Functions
        uses: Azure/functions-action@v1
        with:
          app-name: station-triage-functions
          package: station-triage-functions.zip
          remote-build: true

  deploy-station-dashboard:
    name: Deploy StationDashboard
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        working-directory: src/StationDashboard
        env:
          VITE_MANIFEST_API_URL: ${{ vars.VITE_MANIFEST_API_URL }}
          VITE_AI_API_URL: ${{ vars.VITE_AI_API_URL }}
          VITE_TRIAGE_API_URL: ${{ vars.VITE_TRIAGE_API_URL }}
        run: |
          npm install
          npm run build
      - name: Verify build output is a real production bundle
        working-directory: src/StationDashboard
        run: |
          if [ ! -f dist/index.html ]; then
            echo "ERROR: dist/index.html does not exist. Build did not produce expected output."
            exit 1
          fi
          if grep -q "/src/main.tsx" dist/index.html; then
            echo "ERROR: dist/index.html references raw source (/src/main.tsx) instead of a compiled bundle. This is not a real production build."
            exit 1
          fi
          if ! grep -q "/assets/" dist/index.html; then
            echo "ERROR: dist/index.html does not reference a compiled /assets/ bundle as expected."
            exit 1
          fi
          echo "Verified: dist/index.html references a real compiled bundle."
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /src/StationDashboard/dist
          output_location: ""
          skip_app_build: true
